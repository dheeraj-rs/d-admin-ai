<header class="bg-gray-900 border-b border-gray-700 sticky top-0 z-50">
    <nav x-data="{ isOpen: false }" class="container px-6 py-4 mx-auto md:flex md:justify-between md:items-center">
        <div class="flex items-center justify-between">
            <a href="#" class="text-2xl font-bold text-white transition-colors duration-300 transform hover:text-gray-300">
                Brand
            </a>

            <!-- Mobile menu button -->
            <div class="flex md:hidden">
                <button x-cloak @click="isOpen = !isOpen" type="button" class="text-gray-200 hover:text-gray-400 focus:outline-none focus:text-gray-400" aria-label="toggle menu">
                    <svg x-show="!isOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 8h16M4 16h16" />
                    </svg>
            
                    <svg x-show="isOpen" xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Mobile Menu open: "block", Menu closed: "hidden" -->
        <div x-cloak :class="[isOpen ? 'translate-x-0 opacity-100 ' : 'opacity-0 -translate-x-full']" class="absolute inset-x-0 z-20 w-full px-6 py-4 transition-all duration-300 ease-in-out bg-gray-900 md:bg-transparent md:mt-0 md:p-0 md:top-0 md:relative md:w-auto md:opacity-100 md:translate-x-0 md:flex md:items-center">
            <div class="flex flex-col md:flex-row md:mx-6">
                <a class="my-2 text-gray-200 transition-colors duration-300 transform hover:text-blue-400 md:mx-4 md:my-0" href="#">Home</a>
                <a class="my-2 text-gray-200 transition-colors duration-300 transform hover:text-blue-400 md:mx-4 md:my-0" href="#">Services</a>
                <a class="my-2 text-gray-200 transition-colors duration-300 transform hover:text-blue-400 md:mx-4 md:my-0" href="#">Projects</a>
                <a class="my-2 text-gray-200 transition-colors duration-300 transform hover:text-blue-400 md:mx-4 md:my-0" href="#">Contact</a>
            </div>

            <div class="flex justify-center md:block">
                <a class="relative text-gray-200 transition-colors duration-300 transform hover:text-gray-300" href="#">
                    <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </a>
            </div>
        </div>
    </nav>
</header>
