<section data-component-name="Contact2" class="bg-zinc-950 py-24 px-4 sm:px-6 lg:px-8">
  <div class="max-w-7xl mx-auto">
    <div class="border-t border-zinc-800 pt-16 mb-16">
      <span class="text-xs font-bold text-zinc-500 uppercase tracking-[0.3em]">// Contact</span>
      <h2 class="text-5xl sm:text-7xl font-black text-white tracking-tighter mt-3 leading-none">LET'S<br/>TALK.</h2>
    </div>
    <div class="grid grid-cols-1 lg:grid-cols-5 gap-16">
      <div class="lg:col-span-2 space-y-8">
        <p class="text-zinc-400 text-lg leading-relaxed">Available for freelance work, full-time roles, and everything in between. Let's create something that matters.</p>
        <div>
          <div class="text-xs text-zinc-600 uppercase tracking-widest mb-2">Email</div>
          <a href="mailto:hello@dev.com" class="text-white font-bold text-lg hover:text-zinc-300 transition-colors">hello@dev.com</a>
        </div>
        <div>
          <div class="text-xs text-zinc-600 uppercase tracking-widest mb-2">LinkedIn</div>
          <a href="#" class="text-white font-bold text-lg hover:text-zinc-300 transition-colors">linkedin.com/in/dev</a>
        </div>
        <div>
          <div class="text-xs text-zinc-600 uppercase tracking-widest mb-4">Socials</div>
          <div class="flex gap-4">
            <a href="#" class="w-10 h-10 border border-zinc-700 flex items-center justify-center text-zinc-400 hover:border-zinc-400 hover:text-white transition-all">GH</a>
            <a href="#" class="w-10 h-10 border border-zinc-700 flex items-center justify-center text-zinc-400 hover:border-zinc-400 hover:text-white transition-all">TW</a>
            <a href="#" class="w-10 h-10 border border-zinc-700 flex items-center justify-center text-zinc-400 hover:border-zinc-400 hover:text-white transition-all">IN</a>
          </div>
        </div>
      </div>
      <div class="lg:col-span-3">
        <form class="space-y-6">
          <div class="grid grid-cols-2 gap-6">
            <div>
              <label class="block text-xs text-zinc-500 uppercase tracking-widest mb-3">Name</label>
              <input type="text" placeholder="Your Name" class="w-full px-0 py-3 bg-transparent border-b border-zinc-700 text-white placeholder-zinc-600 focus:outline-none focus:border-white transition-colors"/>
            </div>
            <div>
              <label class="block text-xs text-zinc-500 uppercase tracking-widest mb-3">Email</label>
              <input type="email" placeholder="your@email.com" class="w-full px-0 py-3 bg-transparent border-b border-zinc-700 text-white placeholder-zinc-600 focus:outline-none focus:border-white transition-colors"/>
            </div>
          </div>
          <div>
            <label class="block text-xs text-zinc-500 uppercase tracking-widest mb-3">Project</label>
            <input type="text" placeholder="What are you building?" class="w-full px-0 py-3 bg-transparent border-b border-zinc-700 text-white placeholder-zinc-600 focus:outline-none focus:border-white transition-colors"/>
          </div>
          <div>
            <label class="block text-xs text-zinc-500 uppercase tracking-widest mb-3">Message</label>
            <textarea rows="4" placeholder="Tell me more..." class="w-full px-0 py-3 bg-transparent border-b border-zinc-700 text-white placeholder-zinc-600 focus:outline-none focus:border-white transition-colors resize-none"></textarea>
          </div>
          <button type="submit" class="group relative inline-flex items-center justify-center w-full py-5 bg-white text-zinc-950 font-black uppercase tracking-widest overflow-hidden hover:text-white transition-colors duration-300">
            <span class="absolute inset-0 bg-zinc-800 -translate-x-full group-hover:translate-x-0 transition-transform duration-300 z-0"></span>
            <span class="relative z-10">Send Message →</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</section>
